<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistente Virtual ITA - Cloud Service</title>
    <!-- Cargamos Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002855; /* Azul marino institucional */
            --primary-hover: #001835;
            --primary-gradient: linear-gradient(135deg, #0b2f61 0%, #001835 100%);
            --background-gradient: linear-gradient(135deg, #020617 0%, #061224 50%, #0b1a30 100%);
            --chat-bg: rgba(10, 22, 41, 0.9); /* Translúcido azul marino profundo */
            --border-color: rgba(212, 175, 55, 0.25); /* Dorado translúcido */
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --gold-accent: #d4af37; /* Oro institucional */
            --gold-gradient: linear-gradient(135deg, #f59e0b 0%, #d4af37 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--background-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; /* Altura dinámica moderna */
            margin: 0;
            overflow: hidden;
            color: var(--text-light);
        }

        #chat-container {
            width: 90%;
            max-width: 440px;
            height: 85vh;
            background: var(--chat-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        #header {
            background: var(--primary-gradient);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
            z-index: 10;
            border-bottom: 2px solid var(--gold-accent);
            flex-shrink: 0;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-logo {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--gold-accent);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            padding: 5px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            background: rgba(212, 175, 55, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.35);
            color: var(--gold-accent);
            font-weight: 500;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background-color: rgba(7, 16, 31, 0.55);
            scroll-behavior: smooth;
        }

        /* Barra de scroll temática dorada */
        #messages::-webkit-scrollbar {
            width: 4px;
        }
        #messages::-webkit-scrollbar-track {
            background: transparent;
        }
        #messages::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.25);
            border-radius: 10px;
        }

        .msg {
            padding: 10px 16px;
            border-radius: 18px;
            max-width: 85%;
            font-size: 13.5px;
            line-height: 1.45;
            word-wrap: break-word;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(8px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user {
            align-self: flex-end;
            background: var(--gold-gradient);
            color: #050c18;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2);
            font-weight: 500;
        }

        .bot {
            align-self: flex-start;
            background: #112240;
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .bot strong {
            color: var(--gold-accent);
            font-weight: 600;
        }

        /* Burbuja de Escribiendo */
        .typing-bubble {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 16px;
            background: #112240;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .typing-bubble span {
            width: 7px;
            height: 7px;
            background: var(--gold-accent);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
            opacity: 0.7;
        }

        .typing-bubble span:nth-child(1) { animation-delay: -0.32s; }
        .typing-bubble span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* Chips / Botones rápidos */
        #suggestions-panel {
            padding: 0 16px 12px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            background: transparent;
            flex-shrink: 0;
        }

        #suggestions-panel::-webkit-scrollbar {
            display: none;
        }

        .suggestion-chip {
            background: #0f1c30;
            color: var(--gold-accent);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .suggestion-chip:hover {
            background: var(--gold-gradient);
            color: #050c18;
            border-color: var(--gold-accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        /* Caja de entrada */
        #input-area {
            display: flex;
            padding: 12px 16px;
            background: #0b1526;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
            flex-shrink: 0;
        }

        #user-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            outline: none;
            font-size: 13.5px;
            font-family: inherit;
            transition: all 0.2s ease;
            color: white;
            background: #0f1c30;
            -webkit-appearance: none;
        }

        #user-input::placeholder {
            color: var(--text-muted);
        }

        #user-input:focus {
            border-color: var(--gold-accent);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
            background: #112035;
        }

        #send-btn {
            background: var(--gold-gradient);
            color: #050c18;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            margin-left: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.25);
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        #send-btn:hover {
            background: #f59e0b;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.4);
        }

        #send-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform: rotate(45deg);
            margin-right: 2px;
        }

        /* 📱 DISEÑO RESPONSIVO ULTRA AJUSTADO PARA MÓVILES */
        @media (max-width: 768px) {
            #chat-container {
                width: 95%;
                height: 88vh;
                border-radius: 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                background: #020617;
                align-items: stretch;
            }
            #chat-container {
                width: 100%;
                height: 100%;
                height: 100dvh; /* Evita que el teclado de Android/iOS corte la pantalla */
                border-radius: 0;
                border: none;
                max-width: none;
            }
            #header {
                padding: 12px 16px;
                border-bottom-width: 1.5px;
            }
            .bot-logo {
                width: 34px;
                height: 34px;
                padding: 4px;
            }
            .header-title {
                font-size: 14px;
            }
            .status-container {
                font-size: 10px;
                padding: 2px 8px;
            }
            #messages {
                padding: 16px;
                gap: 12px;
            }
            .msg {
                padding: 9px 14px;
                font-size: 13px;
                max-width: 90%;
            }
            #suggestions-panel {
                padding: 0 12px 8px 12px;
                gap: 6px;
            }
            .suggestion-chip {
                padding: 5px 10px;
                font-size: 11px;
            }
            #input-area {
                padding: 10px 12px;
            }
            #user-input {
                padding: 8px 14px;
                font-size: 13px;
            }
            #send-btn {
                width: 34px;
                height: 34px;
                margin-left: 6px;
            }
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <!-- Cabecera Premium -->
        <div id="header">
            <div class="header-info">
                <!-- Escudo de engranaje institucional (TecNM/ITA) en formato SVG Premium -->
                <div class="bot-logo">
                    <svg viewBox="0 0 100 100" style="width: 100%; height: 100%;">
                        <circle cx="50" cy="50" r="44" fill="none" stroke="var(--gold-accent)" stroke-width="4"/>
                        <!-- Dientes de engranaje -->
                        <g stroke="var(--gold-accent)" stroke-width="6" stroke-linecap="round">
                            <line x1="50" y1="6" x2="50" y2="18"/>
                            <line x1="50" y1="82" x2="50" y2="94"/>
                            <line x1="6" y1="50" x2="18" y2="50"/>
                            <line x1="82" y1="50" x2="94" y2="50"/>
                            <line x1="19" y1="19" x2="28" y2="28"/>
                            <line x1="72" y1="72" x2="81" y2="81"/>
                            <line x1="19" y1="81" x2="28" y2="72"/>
                            <line x1="72" y1="28" x2="81" y2="19"/>
                        </g>
                        <!-- Círculo interior dorado -->
                        <circle cx="50" cy="50" r="28" fill="none" stroke="var(--gold-accent)" stroke-width="3"/>
                        <circle cx="50" cy="50" r="14" fill="var(--gold-accent)"/>
                    </svg>
                </div>
                <div>
                    <div class="header-title">Asistente Universitario ITA</div>
                    <div style="font-size: 10px; opacity: 0.85;">Cloud Service</div>
                </div>
            </div>
            <div class="status-container">
                <div class="status-dot"></div>
                <span>En línea</span>
            </div>
        </div>

        <!-- Área de mensajes -->
        <div id="messages">
            <div class="msg bot">¡Bienvenido! Soy tu asistente en la nube. Puedes preguntarme sobre inscripciones, servicio social, residencias o trámites escolares. ¿En qué te ayudo?</div>
        </div>

        <!-- Panel de sugerencias rápidas (Chips) -->
        <div id="suggestions-panel">
            <div class="suggestion-chip" onclick="quickAsk('Servicio Social')">Servicio Social</div>
            <div class="suggestion-chip" onclick="quickAsk('Residencias')">Residencias</div>
            <div class="suggestion-chip" onclick="quickAsk('Inscripciones')">Inscripciones</div>
            <div class="suggestion-chip" onclick="quickAsk('Comité Académico')">Comité</div>
        </div>

        <!-- Caja de Texto y Botón -->
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Escribe tu duda aquí..." onkeypress="handleKey(event)" autocomplete="off">
            <button id="send-btn" onclick="send()">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const box = document.getElementById('messages');
        const input = document.getElementById('user-input');

        function handleKey(e) { 
            if (e.key === 'Enter') send(); 
        }

        function quickAsk(text) {
            input.value = text;
            send();
        }

        function formatMessage(text) {
            // Convertir negritas **texto** a <strong>texto</strong>
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Convertir enlaces [texto](url) a <a href="url" target="_blank" style="color: var(--gold-accent); text-decoration: underline; font-weight: 500;">texto</a>
            formatted = formatted.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color: var(--gold-accent); text-decoration: underline; font-weight: 500;">texto</a>');
            // Convertir saltos de línea a <br> para mejorar la lectura
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        function send() {
            const text = input.value.trim();
            if(!text) return;
            
            // Agregar mensaje del usuario
            box.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            // Mostrar animación de "escribiendo..."
            const typingId = 'typing_' + Date.now();
            box.innerHTML += `
                <div class="typing-bubble" id="${typingId}">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            box.scrollTop = box.scrollHeight;

            fetch('/get_response', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            })
            .then(res => res.json())
            .then(data => {
                // Eliminar animación de escribiendo
                const bubble = document.getElementById(typingId);
                if (bubble) bubble.remove();

                // Agregar respuesta formateada del bot
                const formattedResponse = formatMessage(data.response);
                box.innerHTML += `<div class="msg bot">${formattedResponse}</div>`;
                box.scrollTop = box.scrollHeight;
            })
            .catch(() => {
                const bubble = document.getElementById(typingId);
                if (bubble) bubble.remove();

                box.innerHTML += `<div class="msg bot">Error de conexión con el servidor Azure. Intenta de nuevo más tarde.</div>`;
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
